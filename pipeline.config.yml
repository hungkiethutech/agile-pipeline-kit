# Pipeline config — choose the engine (skill/repo) for each stage.
# Edit this per program/project to "plug in" the engine you want.
# engine.skill  = a Claude Code skill name (loaded directly).
# engine.repo   = a GitHub repo reference (method pulled via vc-xia / vc-repomix).
# You may set both; the agent uses the skill as primary and the repo as reference standard.

project:
  name: "my-new-project"
  stack: "nextjs + fastify + postgres(prisma)"   # change per project
  db: "postgres-prisma"                            # postgres-prisma | mysql | mongodb | ...

stages:
  requirements:                 # Stage 1 — BA
    skill: deep-research
    repo: github/spec-kit        # spec-driven; anti vibe-coding
  design:                       # Stage 2 — UX/UI (anti "AI slop")
    skill: high-end-visual-design   # taste; swap for design-taste-frontend / minimalist-ui
    repo: framer/motion             # animation building block; optional pmndrs/* or aceternity/ui
  architecture:                 # Stage 3 — Architecture & DB
    skill: vc-tech-graph            # export ERD / architecture diagrams
    repo: prisma/prisma             # + holistics/dbml, treffynnon/sqlstyle.guide, OAI/OpenAPI-Specification
  development:                  # Stage 4 — Development BE+FE
    skill: vc-frontend-design
    repo: goldbergyoni/nodebestpractices   # + airbnb/javascript ; (Superpowers can be plugged in later)
  qa:                           # Stage 5 — INDEPENDENT QA (black-box)
    skill: vc-web-testing
    repo: goldbergyoni/javascript-testing-best-practices   # + microsoft/playwright
  integration:                  # Stage 5b — INDEPENDENT cross-module integration (auto-runs only if ticket touches 2+ modules)
    skill: vc-web-testing
    repo: microsoft/playwright
  security:                     # Stage 6 — INDEPENDENT Pentest (OWASP Top 10)
    skill: vc-security
    repo: OWASP/wstg                       # + OWASP/Top10, OWASP/CheatSheetSeries, zaproxy/zaproxy
  devops:                       # Stage 7 — Deployment
    skill: ""
    repo: actions/starter-workflows        # + MichaelCade/90DaysOfDevOps
  ops:                          # Stage 8 — Operations
    skill: vc-autoresearch
    repo: upptime/upptime                  # free monitoring on GitHub Actions

gates:                          # Human approval gates (pause and wait for "approve")
  - after: requirements         # approve requirements
  - before: devops              # approve before deploy

# --- v0.3: coherence for many-module projects ---
context:                        # Persistent project memory — EVERY agent reads it first
  dir: context                  # holds architecture.md, module-map.md, adr/, glossary
  updated_by: architecture      # the Architecture team keeps it current after each ticket
arch_review:                    # Architectural oversight gate (agent: ap-arch-review-agent)
  when: after development        # runs after Dev, before QA
  blocks_on: undocumented-contract-change   # a shared-contract change without an ADR = FAIL
